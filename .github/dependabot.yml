# Automatische dependency-PR's (review + CI vóór merge).
# Geen npm-"groups": gegroepeerde bumps breken vaak in één keer (lint/build); losse PR's zijn
# makkelijker te reviewen en veilig te mergen.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 20

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
