# Dependabot: alleen semver-patch en semver-minor voor npm.
# Major upgrades (Tailwind 4, ESLint 10, React 19, Next 15/16, @types/node 25, …)
# breken bijna altijd CI tot je bewust migreert — die doe je handmatig op main.
#
# Zie: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file#specifying-the-type-of-updates-to-ignore
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 15
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
