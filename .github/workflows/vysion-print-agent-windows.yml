# Bouwt twee versies:
#   1. Vysion-Print-Agent-Setup.exe  — klassieke installer (voor als SmartScreen toelaat)
#   2. Vysion-Print-Agent-USB.zip    — portable map, geen installatie, rechtstreeks van USB stick
name: Vysion Print Agent — Windows Setup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/vysion-print-agent/package-lock.json

      - name: npm ci
        working-directory: apps/vysion-print-agent
        run: npm ci

      - name: Bouw installer + portable map
        working-directory: apps/vysion-print-agent
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Toon dist-inhoud (debug)
        shell: pwsh
        run: Get-ChildItem "apps/vysion-print-agent/dist" -Recurse -Depth 1 | Select-Object FullName

      - name: Maak USB ZIP van portable map
        shell: pwsh
        run: |
          $dist = "apps/vysion-print-agent/dist"

          # electron-builder --nsis maakt altijd een win-unpacked map naast de Setup.exe
          $unpacked = Join-Path $dist "win-unpacked"
          if (-not (Test-Path $unpacked)) {
            # Fallback: zoek map met "unpacked" in naam
            $found = Get-ChildItem $dist -Directory | Where-Object { $_.Name -like "*unpacked*" } | Select-Object -First 1
            if ($found) { $unpacked = $found.FullName }
            else { throw "Geen win-unpacked map gevonden. Controleer de dist-inhoud hierboven." }
          }

          $targetDir = Join-Path $dist "VysionPrintAgent-USB"
          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
          Copy-Item -Path "$unpacked\*" -Destination $targetDir -Recurse -Force

          $startBat = "@echo off`r`nchcp 65001 >nul`r`necho.`r`necho  Vysion Print Agent wordt gestart...`r`necho  Het icoon verschijnt rechtsonder in de taakbalk.`r`necho.`r`nstart `"`" `"%~dp0Vysion Print Agent.exe`"`r`n"
          Set-Content -LiteralPath "$targetDir\START.bat" -Value $startBat -Encoding OEM

          $readme = "Vysion Print Agent - USB versie`r`n================================`r`n`r`n1. Kopieer deze map naar de kassa-pc (bv. C:\VysionPrint)`r`n2. Dubbelklik START.bat`r`n3. Vysion icoon rechtsonder -> Instellingen: kies Printer + vul Kassa-URL -> Opslaan & Open Kassa`r`n4. Klaar! Geen installatie nodig.`r`n`r`nAutostart: snelkoppeling van START.bat in shell:startup plaatsen.`r`n"
          Set-Content -LiteralPath "$targetDir\LEES-MIJ.txt" -Value $readme -Encoding UTF8

          $zipPath = Join-Path $dist "Vysion-Print-Agent-USB.zip"
          Compress-Archive -Path "$targetDir\*" -DestinationPath $zipPath -Force
          Write-Host "USB ZIP klaar: $zipPath" -ForegroundColor Green

      - name: Vaste bestandsnaam installer
        shell: pwsh
        run: |
          $dist = "apps/vysion-print-agent/dist"
          $exe = Get-ChildItem -LiteralPath $dist -Filter "*Setup*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { throw "Geen Setup.exe gevonden in $dist" }
          Copy-Item -LiteralPath $exe.FullName -Destination "$dist/Vysion-Print-Agent-Setup.exe" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: Vysion-Print-Agent-Setup
          path: apps/vysion-print-agent/dist/Vysion-Print-Agent-Setup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: Vysion-Print-Agent-USB
          path: apps/vysion-print-agent/dist/Vysion-Print-Agent-USB.zip

      - name: Release bijwerken
        uses: ncipollo/release-action@v1
        with:
          tag: vysion-print-agent-windows
          name: Vysion Print Agent (Windows)
          body: |
            ## Vysion Print Agent — Windows

            ### 🥇 Aanbevolen: USB versie (geen SmartScreen blokkering)
            **→ Download `Vysion-Print-Agent-USB.zip`**
            1. ZIP uitpakken op USB stick "usb disk" of rechtstreeks op de pc
            2. Dubbelklik `START.bat`
            3. Vysion icoon rechtsonder → Instellingen: Printer + Kassa-URL → Opslaan & Open Kassa
            4. Klaar — geen installatie nodig!

            ### Klassieke installer (als SmartScreen toelaat)
            Download `Vysion-Print-Agent-Setup.exe` en voer uit.

            ---
            Build van branch `main` (GitHub Actions).
          artifacts: >
            apps/vysion-print-agent/dist/Vysion-Print-Agent-Setup.exe,
            apps/vysion-print-agent/dist/Vysion-Print-Agent-USB.zip
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
