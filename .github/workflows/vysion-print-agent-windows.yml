# Zie PRINT-AGENT-INSTALL.txt in de repo — directe .exe-link. Alleen bouwen: Run workflow.
name: Vysion Print Agent — Windows Setup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/vysion-print-agent/package-lock.json

      - name: npm ci & electron-builder
        working-directory: apps/vysion-print-agent
        run: |
          npm ci
          npm run dist

      - name: Vaste bestandsnaam (website-downloadlink)
        shell: pwsh
        run: |
          $dist = "apps/vysion-print-agent/dist"
          $exe = Get-ChildItem -LiteralPath $dist -Filter "*Setup*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { throw "Geen Setup.exe gevonden in $dist" }
          Copy-Item -LiteralPath $exe.FullName -Destination "$dist/Vysion-Print-Agent-Setup.exe" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: Vysion-Print-Agent-Setup
          path: apps/vysion-print-agent/dist/Vysion-Print-Agent-Setup.exe

      - name: Release bijwerken (zelfde tag als downloadpagina)
        uses: ncipollo/release-action@v1
        with:
          tag: vysion-print-agent-windows
          name: Vysion Print Agent (Windows)
          body: |
            **Vysion-Print-Agent-Setup.exe**

            1. Download hieronder.
            2. Installeren; agent draait bij de klok.
            3. Icoon → juiste Epson kiezen.

            Build van branch `main` (GitHub Actions).
          artifacts: apps/vysion-print-agent/dist/Vysion-Print-Agent-Setup.exe
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
